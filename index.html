      .detail-body { padding: 0 20px 24px; }
      .detail-header, .order-card { padding: 22px; }
      .order-footer { flex-direction: column; align-items: stretch; }
      .btn-order, .btn-stock { width: 100%; }
    }
  </style>
</head>

    function selectService(key) {

      if (!service) return;
      landingContent.style.display = 'none';
      detailSection.classList.add('active');
      serviceName.textContent = service.name;
      serviceIcon.innerHTML = `<i class="${service.icon}"></i>`;

        stockUrl.style.display = 'none';
      } else {
        stockUrl.style.display = 'inline-flex';

      if (key === 'paket-akrab-xla' || key === 'akrab-xda') {
        areaUrl.href = 'https://cekareaxl.vercel.app/';
        areaUrl.innerHTML = '<i class="fas fa-map-marker-alt"></i> Cek Area';

      } else {
        areaUrl.style.display = 'none';

        const option = document.createElement('option');
        option.value = `${key}||${plan.title}||${plan.price}||${JSON.stringify(plan.areas)}`;
        option.textContent = `${plan.title} — ${plan.price}`;
        packageSelect.appendChild(option);
      });
      phoneInput.value = localStorage.getItem('lastPhone') || '';
      currentService = key;
      window.location.hash = key;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    packageSelect.addEventListener('change', function() {
      const packageValue = this.value;
      if (!packageValue) {
        areasInfo.style.display = 'none';
        return;
      }
      const parts = packageValue.split('||');
      const areas = JSON.parse(parts[3]);
      if (areas && areas.length > 0) {
        areasList.innerHTML = areas.map(area => `<li>${area}</li>`).join('');
        areasInfo.style.display = 'block';
      } else {
        areasInfo.style.display = 'none';
      }
    });

      detailSection.classList.remove('active');
      landingContent.style.display = 'block';
      packageSelect.innerHTML = '<option value="">Pilih paket</option>';
      phoneInput.value = '';
      areaUrl.style.display = 'none';
      stockUrl.style.display = 'inline-flex';
      areasInfo.style.display = 'none';
      areasList.innerHTML = '';
      currentService = null;
      window.location.hash = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      const serviceKey = currentService;
      const phone = phoneInput.value.trim();
      const packageValue = packageSelect.value;

      localStorage.setItem('lastPhone', phone);
      const parts = packageValue.split('||');

      window.open(`https://wa.me/${whatsappAdmin}?text=${message}`, '_blank');
    }

    let currentService = null;

    if (window.location.hash) {
